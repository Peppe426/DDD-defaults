name: Release Template Builds

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, Test, Package and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Validate annotated semantic version tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG_NAME}' must follow semantic versioning as vX.Y.Z."
            exit 1
          fi

          if [[ "$(git cat-file -t "${TAG_NAME}")" != "tag" ]]; then
            echo "Tag '${TAG_NAME}' must be an annotated tag."
            exit 1
          fi

          echo "VERSION=${TAG_NAME#v}" >> "${GITHUB_ENV}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack template package
        run: |
          mkdir -p artifacts
          dotnet pack packaging/DDDDefaults.Templates/DDDDefaults.Templates.csproj --configuration Release --output artifacts /p:Version=${VERSION}

      - name: Smoke test template package
        shell: pwsh
        run: |
          ./scripts/Test-TemplatePackage.ps1 -PackagePath "./artifacts/Peppe426.DDDDefaults.Templates.${{ env.VERSION }}.nupkg"

      - name: Upload template package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Peppe426.DDDDefaults.Templates-${{ env.VERSION }}
          path: artifacts/Peppe426.DDDDefaults.Templates.${{ env.VERSION }}.nupkg
          retention-days: 90

      - name: Upload scaffolding script artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: New-DomainTemplate-${{ env.VERSION }}
          path: scripts/New-DomainTemplate.ps1
          retention-days: 90

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/Peppe426.DDDDefaults.Templates.${{ env.VERSION }}.nupkg
            scripts/New-DomainTemplate.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
