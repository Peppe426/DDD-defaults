name: Release Template Builds

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, Test, Package and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: global.json

      - name: Validate annotated semantic version tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG_NAME}' must follow semantic versioning as vX.Y.Z."
            exit 1
          fi

          if [[ "$(git cat-file -t "${TAG_NAME}")" != "tag" ]]; then
            echo "Tag '${TAG_NAME}' must be an annotated tag."
            exit 1
          fi

          echo "VERSION=${TAG_NAME#v}" >> "${GITHUB_ENV}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Package Domain.Common template
        run: |
          mkdir -p artifacts
          zip -r "artifacts/Domain.Common-${VERSION}.zip" src/Domain.Common/

      - name: Package Domain.XXX template
        run: |
          zip -r "artifacts/Domain.XXX-${VERSION}.zip" src/Domain.XXX/

      - name: Upload Domain.Common artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Domain.Common-${{ env.VERSION }}
          path: artifacts/Domain.Common-${{ env.VERSION }}.zip
          retention-days: 90

      - name: Upload Domain.XXX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Domain.XXX-${{ env.VERSION }}
          path: artifacts/Domain.XXX-${{ env.VERSION }}.zip
          retention-days: 90

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/Domain.Common-${{ env.VERSION }}.zip
            artifacts/Domain.XXX-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
