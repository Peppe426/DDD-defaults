name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build, Test and Publish Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack template package
        run: |
          mkdir -p artifacts
          dotnet pack packaging/DDDDefaults.Templates/DDDDefaults.Templates.csproj --configuration Release --output artifacts /p:Version=0.0.0-ci.${{ github.run_number }}

      - name: Smoke test template package
        shell: pwsh
        run: |
          ./scripts/Test-TemplatePackage.ps1 -PackagePath "./artifacts/Peppe426.DDDDefaults.Templates.0.0.0-ci.${{ github.run_number }}.nupkg"

      - name: Upload template package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Peppe426.DDDDefaults.Templates
          path: artifacts/Peppe426.DDDDefaults.Templates.0.0.0-ci.${{ github.run_number }}.nupkg
          retention-days: 90

      - name: Upload scaffolding script artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: New-DomainTemplate.ps1
          path: scripts/New-DomainTemplate.ps1
          retention-days: 90
