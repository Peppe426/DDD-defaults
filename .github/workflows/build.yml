name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build, Test and Publish Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Package Domain.Common template
        run: |
          mkdir -p artifacts
          zip -r artifacts/Domain.Common.zip src/Domain.Common/

      - name: Package Domain.XXX template
        run: |
          zip -r artifacts/Domain.XXX.zip src/Domain.XXX/

      - name: Upload Domain.Common artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Domain.Common
          path: artifacts/Domain.Common.zip
          retention-days: 90

      - name: Upload Domain.XXX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: Domain.XXX
          path: artifacts/Domain.XXX.zip
          retention-days: 90
